<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KiranaStore - Fresh Kirana</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN Script -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Tailwind Configuration & CSS -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
            },
            colors: {
              'primary': '#FFA500', // Orange
              'brand-yellow': '#FEF3C7',
              'brand-orange': '#FDBA74',
              'brand-black': '#2D3436',
              'text-primary': '#1A202C',
              'text-secondary': '#6B7280',
            },
          }
        }
      }
    </script>

    <style type="text/tailwindcss">
      /* Custom CSS & Animations */
      body {
        background-color: #FEF3C7;
        font-family: 'Poppins', sans-serif;
      }

      .btn-shine {
        position: relative;
        overflow: hidden;
        animation: pulse-and-shine 2.5s infinite;
      }

      .btn-shine::after {
        content: '';
        position: absolute;
        top: 0;
        left: -200%;
        width: 200%;
        height: 100%;
        transform: skewX(-25deg);
        background-image: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
        animation: shine 2.5s linear infinite;
      }

      @keyframes slide-in { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes slide-out { from { transform: translateX(0); opacity: 1; } to { transform: translateX(400px); opacity: 0; } }
      .animate-slide-in { animation: slide-in 0.3s ease-out forwards; }
      .animate-slide-out { animation: slide-out 0.3s ease-in forwards; }
      @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-up { animation: fade-in-up 0.3s ease-out; }
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      .animate-fade-in { animation: fade-in 0.3s ease-out; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .animate-spin { animation: spin 1s linear infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      
      html { scroll-behavior: smooth; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #888; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
      *:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
      *:focus:not(:focus-visible) { outline: none; }
      
      @keyframes pulse-and-shine {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes shine {
        100% { left: 200%; }
      }
    </style>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    
    <!-- ✅ FIX: Razorpay Checkout Script ko yahan add kiya gaya hai -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
  </body>
</html>
